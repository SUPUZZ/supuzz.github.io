<header>
    <style>
        /* 防止i18n闪烁 - 初始隐藏需要翻译的元素 */
        [data-i18n] {
            visibility: hidden;
        }
        [data-i18n].i18n-ready {
            visibility: visible;
        }
        #navLinks li a[data-i18n] {
            visibility: hidden;
        }
        #navLinks.i18n-ready li a[data-i18n] {
            visibility: visible;
        }
    </style>
    <div class="container">
        <nav>
            <div class="logo">
                <a href="index.html"
                    style="display: flex; align-items: center; color: #FEDD00; text-decoration: none;">
                    <img src="/images/icon_supuzz.svg" alt="SUPUZZ Logo" style="width: 24px; height: 24px; margin-right: 8px;">
                    SUPUZZ
                </a>
            </div>
            <button class="menu-btn" id="menuBtn" aria-label="Toggle menu" data-i18n-attr="aria-label|menuToggle">
                <span class="material-symbols-rounded" style="font-size: 32px;">menu</span>
            </button>
            <ul class="nav-links" id="navLinks">
                <li class="nav-close-btn" id="navCloseBtn" aria-label="Close menu" data-i18n-attr="aria-label|menuClose">
                    <span class="material-symbols-rounded">close</span>
                </li>

                <li><a href="index.html" data-i18n="home">Home</a></li>
                <li><a href="blog.html" data-i18n="journal">Journal</a></li>
                <li><a href="index.html#products" data-i18n="products">Products</a></li>
                <li><a href="about.html" data-i18n="about">About Us</a></li>
                <li><a href="contact.html" data-i18n="contact">Contact</a></li>
                <li class="lang-switch-item">
                    <a href="#" class="lang-toggle" id="langSwitchLink" aria-label="Switch language" data-i18n-attr="aria-label|langSelect">
                        <span class="material-symbols-rounded">globe</span>
                        <span data-i18n="langCode">EN</span>
                        <span class="material-symbols-rounded lang-arrow">expand_more</span>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
    <script>
        (function() {
            const t = {
                en: {
                    menuToggle: 'Toggle menu',
                    menuClose: 'Close menu',
                    home: 'Home',
                    journal: 'Journal',
                    products: 'Products',
                    about: 'About Us',
                    contact: 'Contact',
                    langSelect: 'Switch language',
                    langCode: 'EN'
                },
                es: {
                    menuToggle: 'Toggle menu',
                    menuClose: 'Close menu',
                    home: 'Inicio',
                    journal: 'Diario',
                    products: 'Productos',
                    about: 'Sobre Nosotros',
                    contact: 'Contacto',
                    langSelect: 'Cambiar idioma',
                    langCode: 'ES'
                },
                ja: {
                    menuToggle: 'メニューを切り替え',
                    menuClose: 'メニューを閉じる',
                    home: 'ホーム',
                    journal: 'ジャーナル',
                    products: '製品',
                    about: '会社概要',
                    contact: 'お問い合わせ',
                    langSelect: '言語を切り替え',
                    langCode: 'JA'
                },
                'zh-Hant': {
                    menuToggle: '切換選單',
                    menuClose: '關閉選單',
                    home: '首頁',
                    journal: '部落格',
                    products: '產品',
                    about: '關於我們',
                    contact: '聯絡我們',
                    langSelect: '切換語言',
                    langCode: '繁'
                },
                de: {
                    menuToggle: 'Menü umschalten',
                    menuClose: 'Menü schließen',
                    home: 'Startseite',
                    journal: 'Journal',
                    products: 'Produkte',
                    about: 'Über uns',
                    contact: 'Kontakt',
                    langSelect: 'Sprache wechseln',
                    langCode: 'DE'
                }
            };

            function getLang() {
                var path = window.location.pathname;
                if (path.indexOf('/es/') !== -1) return 'es';
                if (path.indexOf('/ja/') !== -1) return 'ja';
                if (path.indexOf('/zh-Hant/') !== -1) return 'zh-Hant';
                return 'en';
            }

            function applyI18n() {
                var lang = getLang();
                var texts = t[lang];

                document.querySelectorAll('[data-i18n]').forEach(function(el) {
                    var key = el.getAttribute('data-i18n');
                    if (texts[key]) el.textContent = texts[key];
                });

                document.querySelectorAll('[data-i18n-attr]').forEach(function(el) {
                    var parts = el.getAttribute('data-i18n-attr').split('|');
                    var attr = parts[0];
                    var key = parts[1];
                    if (texts[key]) el.setAttribute(attr, texts[key]);
                });

                // 翻译完成后显示元素，防止闪烁
                document.querySelectorAll('[data-i18n]').forEach(function(el) {
                    el.classList.add('i18n-ready');
                });
                document.getElementById('navLinks').classList.add('i18n-ready');
            }

            function toggleMenu() {
                if (window.innerWidth > 768) return;
                var nav = document.getElementById('navLinks');
                var body = document.body;
                if (nav.classList.contains('active')) {
                    nav.classList.remove('active');
                    body.style.overflow = 'auto';
                } else {
                    nav.classList.add('active');
                    body.style.overflow = 'hidden';
                }
            }

            function getCurrentPagePath() {
                return window.location.pathname;
            }

            function getLanguageFromPath(path) {
                if (path.startsWith('/es/')) return 'es';
                if (path.startsWith('/ja/')) return 'ja';
                if (path.startsWith('/zh-Hant/')) return 'zh-Hant';
                if (path.startsWith('/de/')) return 'de';
                return 'en';
            }

            function getPageFilename(path) {
                var parts = path.split('/');
                var filename = parts[parts.length - 1] || 'index.html';
                if (!filename || filename.indexOf('.') === -1) filename = 'index.html';
                return filename;
            }

            function switchLanguage(targetLang) {
                var filename = getPageFilename(getCurrentPagePath());
                var targetPath;
                if (targetLang === 'en') {
                    targetPath = '/' + filename;
                } else {
                    targetPath = '/' + targetLang + '/' + filename;
                }
                window.location.href = targetPath;
            }

            function detectBrowserLang() {
                var supported = ['es', 'ja', 'zh-Hant', 'de'];
                var langs = navigator.languages || [navigator.language || ''];
                for (var i = 0; i < langs.length; i++) {
                    var full = langs[i].toLowerCase();
                    // zh-TW, zh-HK → zh-Hant (Traditional Chinese)
                    if (full.indexOf('zh-tw') !== -1 || full.indexOf('zh-hk') !== -1 || full.indexOf('zh-hant') !== -1) return 'zh-Hant';
                    // de → German
                    if (full.indexOf('de') !== -1) return 'de';
                    var code = full.split('-')[0];
                    if (supported.indexOf(code) !== -1) return code;
                }
                return 'en';
            }

            function getCookie(name) {
                var match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
                return match ? match[2] : null;
            }

            function setCookie(name, value, days) {
                var d = new Date();
                d.setTime(d.getTime() + (days || 365) * 24 * 60 * 60 * 1000);
                document.cookie = name + '=' + value + ';path=/;expires=' + d.toUTCString();
            }

            (function autoRedirect() {
                if (getCookie('lang_pref')) return;
                var currentLang = getLanguageFromPath(window.location.pathname);
                var browserLang = detectBrowserLang();
                if (browserLang !== 'en' && browserLang !== currentLang) {
                    setCookie('lang_pref', browserLang, 365);
                    switchLanguage(browserLang);
                }
            })();

            document.addEventListener('DOMContentLoaded', function() {
                applyI18n();

                // 设置语言切换链接
                var langLink = document.getElementById('langSwitchLink');
                if (langLink) {
                    langLink.href = '/lang.html?from=' + encodeURIComponent(getCurrentPagePath());
                }

                var menuBtn = document.getElementById('menuBtn');
                var closeBtn = document.getElementById('navCloseBtn');
                var navLinks = document.querySelectorAll('#navLinks a');

                if (menuBtn) {
                    menuBtn.addEventListener('click', toggleMenu);
                    menuBtn.addEventListener('keydown', function(e) {
                        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleMenu(); }
                    });
                }
                if (closeBtn) {
                    closeBtn.addEventListener('click', toggleMenu);
                    closeBtn.addEventListener('keydown', function(e) {
                        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleMenu(); }
                    });
                }
                navLinks.forEach(function(link) {
                    link.addEventListener('click', toggleMenu);
                });
            });
        })();
    </script>
</header>
