<header>
    <div class="container">
        <nav>
            <div class="logo">
                <a href="/index-es.html"
                    style="display: flex; align-items: center; color: #FEDD00; text-decoration: none;">
                    <img src="images/icon_supuzz.svg" alt="SUPUZZ Logo" style="width: 24px; height: 24px; margin-right: 8px;">
                    SUPUZZ
                </a>
            </div>
            <button class="menu-btn" id="menuBtn" aria-label="Toggle menu">
                <span class="material-symbols-rounded" style="font-size: 32px;">menu</span>
            </button>
            <ul class="nav-links" id="navLinks">
                <li class="nav-close-btn" id="navCloseBtn" aria-label="Close menu">
                    <span class="material-symbols-rounded">close</span>
                </li>

                <li><a href="/index-es.html">Inicio</a></li>
                <li><a href="/blog-es.html">Diario</a></li>
                <li><a href="/index-es.html#products">Productos</a></li>
                <li><a href="/about-es.html">Sobre Nosotros</a></li>
                <li><a href="/contact-es.html">Contacto</a></li>
                
                <!-- 语言切换按钮 -->
                <li class="lang-switch">
                    <a href="/index.html" class="lang-btn" style="display:flex;align-items:center;gap:4px;">
                        <span class="material-symbols-rounded" style="font-size:18px;">globe</span>
                        EN
                    </a>
                </li>
            </ul>
        </nav>
    </div>
    <script>
        (function() {
            function toggleMenu() {
                if (window.innerWidth > 768) return;
                var nav = document.getElementById('navLinks');
                var body = document.body;
                if (nav.classList.contains('active')) {
                    nav.classList.remove('active');
                    body.style.overflow = 'auto';
                } else {
                    nav.classList.add('active');
                    body.style.overflow = 'hidden';
                }
            }
            document.addEventListener('DOMContentLoaded', function() {
                var menuBtn = document.getElementById('menuBtn');
                var closeBtn = document.getElementById('navCloseBtn');
                var navLinks = document.querySelectorAll('#navLinks a');
                if (menuBtn) {
                    menuBtn.addEventListener('click', toggleMenu);
                    menuBtn.addEventListener('keydown', function(e) {
                        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleMenu(); }
                    });
                }
                if (closeBtn) {
                    closeBtn.addEventListener('click', toggleMenu);
                    closeBtn.addEventListener('keydown', function(e) {
                        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleMenu(); }
                    });
                }
                navLinks.forEach(function(link) {
                    link.addEventListener('click', toggleMenu);
                });
            });
        })();
    </script>
</header>
