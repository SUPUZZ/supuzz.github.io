<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Choose Language | SUPUZZ</title>
    <meta name="robots" content="noindex, follow">

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />

    <!-- External CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
    <meta name="theme-color" content="#6750A4">

    <style>
        .lang-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: clamp(80px, 15vw, 120px) 20px 40px;
        }
        .lang-page .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 32px;
            text-decoration: none;
        }
        .lang-page .logo img {
            width: 28px;
            height: 28px;
        }
        .lang-page .logo span {
            font-size: 1.25rem;
            font-weight: 800;
            color: #6750A4;
        }
        .lang-list {
            max-width: 400px;
            width: 100%;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            padding: 6px;
        }
        .lang-list a {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.95rem;
            color: #49454F;
            transition: background-color 0.15s, color 0.15s;
            border-bottom: 1px solid #f5f5f5;
        }
        .lang-list a:last-child {
            border-bottom: none;
        }
        .lang-list a:hover {
            background-color: #F3EFFF;
            color: #6750A4;
        }
        .lang-list a .native {
            font-size: 0.85rem;
            color: #888;
        }
        .lang-list a.active {
            background-color: #F3EFFF;
            color: #6750A4;
            font-weight: 700;
        }
        .back-link {
            margin-top: 24px;
            font-size: 0.875rem;
            color: #6750A4;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="lang-page">
        <a class="logo" href="/">
            <img src="images/icon_supuzz.svg" alt="SUPUZZ Logo">
            <span>SUPUZZ</span>
        </a>

        <div class="lang-list">
            <a href="#" data-lang="en">
                English
                <span class="native">English</span>
            </a>
            <a href="#" data-lang="es">
                Español
                <span class="native">Spanish</span>
            </a>
            <a href="#" data-lang="ja">
                日本語
                <span class="native">Japanese</span>
            </a>
            <a href="#" data-lang="zh-Hant">
                繁體中文
                <span class="native">Traditional Chinese</span>
            </a>
            <a href="#" data-lang="de">
                Deutsch
                <span class="native">German</span>
            </a>
        </div>

        <a href="javascript:history.back()" class="back-link">
            <span class="material-symbols-rounded" style="font-size:16px;">arrow_back</span>
            Go back
        </a>
    </div>

    <script>
        (function() {
            function getPageFilename(path) {
                var parts = path.split('/');
                var filename = parts[parts.length - 1] || 'index.html';
                if (!filename || filename.indexOf('.') === -1) filename = 'index.html';
                return filename;
            }

            function switchToLang(targetLang, fromPath) {
                var filename = getPageFilename(fromPath || '/index.html');
                var targetPath;
                if (targetLang === 'en') {
                    targetPath = '/' + filename;
                } else {
                    targetPath = '/' + targetLang + '/' + filename;
                }
                var d = new Date();
                d.setTime(d.getTime() + 365 * 24 * 60 * 60 * 1000);
                document.cookie = 'lang_pref=' + targetLang + ';path=/;expires=' + d.toUTCString();
                window.location.href = targetPath;
            }

            var params = new URLSearchParams(window.location.search);
            var fromPath = params.get('from') || '/index.html';

            // 检测当前语言并高亮
            function getLanguageFromPath(path) {
                if (path.indexOf('/es/') !== -1) return 'es';
                if (path.indexOf('/ja/') !== -1) return 'ja';
                if (path.indexOf('/zh-Hant/') !== -1) return 'zh-Hant';
                if (path.indexOf('/de/') !== -1) return 'de';
                if (path.indexOf('/pt/') !== -1) return 'pt';
                return 'en';
            }
            var currentLang = getLanguageFromPath(fromPath);
            document.querySelectorAll('.lang-list a').forEach(function(link) {
                if (link.getAttribute('data-lang') === currentLang) {
                    link.classList.add('active');
                }
            });

            document.querySelectorAll('.lang-list a').forEach(function(link) {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    var lang = this.getAttribute('data-lang');
                    switchToLang(lang, fromPath);
                });
            });
        })();
    </script>
</body>

</html>
