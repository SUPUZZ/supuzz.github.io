<header>
    <div class="container">
        <nav>
            <div class="logo">
                <a href="index.html"
                    style="display: flex; align-items: center; color: #FEDD00; text-decoration: none;">
                    <img src="../images/icon_supuzz.svg" alt="SUPUZZ Logo" style="width: 24px; height: 24px; margin-right: 8px;">
                    SUPUZZ
                </a>
            </div>
            <button class="menu-btn" id="menuBtn" aria-label="Toggle menu">
                <span class="material-symbols-rounded" style="font-size: 32px;">menu</span>
            </button>
            <ul class="nav-links" id="navLinks">
                <li class="nav-close-btn" id="navCloseBtn" aria-label="Close menu">
                    <span class="material-symbols-rounded">close</span>
                </li>

                <li><a href="index.html">Home</a></li>
                <li><a href="blog.html">Journal</a></li>
                <li><a href="index.html#products">Products</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li class="lang-switch-item">
                    <div class="lang-dropdown" id="langDropdown">
                        <button class="lang-toggle" aria-haspopup="true" aria-expanded="false" aria-label="Select language">
                            <span class="material-symbols-rounded">globe</span>
                            <span>EN</span>
                            <span class="material-symbols-rounded lang-arrow">expand_more</span>
                        </button>
                        <ul class="lang-menu" role="menu">
                            <li role="none"><a href="#" class="lang-option active" data-lang="en" role="menuitem" aria-current="true">English</a></li>
                            <li role="none"><a href="#" class="lang-option" data-lang="es" role="menuitem">Español</a></li>
                            <li role="none"><a href="#" class="lang-option" data-lang="ja" role="menuitem">日本語</a></li>
                        </ul>
                    </div>
                </li>
            </ul>
        </nav>
    </div>
    <script>
        (function() {
            function toggleMenu() {
                if (window.innerWidth > 768) return;
                var nav = document.getElementById('navLinks');
                var body = document.body;
                if (nav.classList.contains('active')) {
                    nav.classList.remove('active');
                    body.style.overflow = 'auto';
                } else {
                    nav.classList.add('active');
                    body.style.overflow = 'hidden';
                }
            }

            function getCurrentPagePath() {
                return window.location.pathname;
            }

            function getLanguageFromPath(path) {
                if (path.startsWith('/es/')) return 'es';
                if (path.startsWith('/ja/')) return 'ja';
                return 'en';
            }

            function getPageFilename(path) {
                var parts = path.split('/');
                var filename = parts[parts.length - 1] || 'index.html';
                if (!filename || filename.indexOf('.') === -1) filename = 'index.html';
                return filename;
            }

            function switchLanguage(targetLang) {
                var filename = getPageFilename(getCurrentPagePath());
                var targetPath;
                if (targetLang === 'en') {
                    targetPath = '/' + filename;
                } else {
                    targetPath = '/' + targetLang + '/' + filename;
                }
                window.location.href = targetPath;
            }

            document.addEventListener('DOMContentLoaded', function() {
                var menuBtn = document.getElementById('menuBtn');
                var closeBtn = document.getElementById('navCloseBtn');
                var navLinks = document.querySelectorAll('#navLinks a');

                if (menuBtn) {
                    menuBtn.addEventListener('click', toggleMenu);
                    menuBtn.addEventListener('keydown', function(e) {
                        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleMenu(); }
                    });
                }
                if (closeBtn) {
                    closeBtn.addEventListener('click', toggleMenu);
                    closeBtn.addEventListener('keydown', function(e) {
                        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleMenu(); }
                    });
                }
                navLinks.forEach(function(link) {
                    link.addEventListener('click', toggleMenu);
                });

                var langDropdown = document.getElementById('langDropdown');
                var langToggle = document.querySelector('.lang-toggle');
                var langOptions = document.querySelectorAll('.lang-option');

                if (langToggle) {
                    langToggle.addEventListener('click', function(e) {
                        e.stopPropagation();
                        var isOpen = langDropdown.classList.contains('open');
                        langDropdown.classList.toggle('open');
                        langToggle.setAttribute('aria-expanded', !isOpen);
                    });
                    document.addEventListener('click', function() {
                        langDropdown.classList.remove('open');
                        langToggle.setAttribute('aria-expanded', 'false');
                    });
                }

                langOptions.forEach(function(option) {
                    option.addEventListener('click', function(e) {
                        e.preventDefault();
                        var targetLang = this.getAttribute('data-lang');
                        switchLanguage(targetLang);
                    });
                });

                var currentLang = getLanguageFromPath(window.location.pathname);
                var langCode = langToggle && langToggle.querySelector('span:nth-child(2)');
                if (langCode) {
                    langCode.textContent = currentLang.toUpperCase();
                }

                langOptions.forEach(function(option) {
                    option.classList.remove('active');
                    if (option.getAttribute('data-lang') === currentLang) {
                        option.classList.add('active');
                    }
                });
            });
        })();
    </script>
</header>
