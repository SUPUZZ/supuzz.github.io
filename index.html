<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supuzz - Redirecting...</title>
    <script>
        // Get browser language
        var userLang = navigator.language || navigator.userLanguage;
        userLang = userLang.substring(0, 2).toLowerCase();
        
        // Map language to path
        var langMap = {
            'en': '/en/',
            'es': '/es/',
            'ja': '/ja/'
        };
        
        // Redirect to appropriate language version, default to English
        var targetPath = langMap[userLang] || '/en/';
        
        // Redirect immediately
        window.location.replace(targetPath);
    </script>
    <meta http-equiv="refresh" content="0;url=/en/">
</head>
<body>
    <p>Redirecting to <a href="/en/">English version</a>...</p>
</body>
</html>
