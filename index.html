<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supuzz - Redirecting...</title>
    <script>
        function getCookie(name) {
            var match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
            return match ? match[2] : null;
        }

        function setCookie(name, value, days) {
            var d = new Date();
            d.setTime(d.getTime() + (days || 365) * 24 * 60 * 60 * 1000);
            document.cookie = name + '=' + value + ';path=/;expires=' + d.toUTCString();
        }

        // Check saved language first (from previous manual switch or auto-detect)
        var savedLang = getCookie('lang_pref');
        if (savedLang === 'es' || savedLang === 'ja') {
            window.location.replace('/' + savedLang + '/');
        } else if (!savedLang) {
            // First visit: detect from browser
            var supported = { es: true, ja: true };
            var langs = navigator.languages || [navigator.language || ''];
            var detected = 'en';
            for (var i = 0; i < langs.length; i++) {
                var code = langs[i].substring(0, 2).toLowerCase();
                if (supported[code]) { detected = code; break; }
            }
            setCookie('lang_pref', detected, 365);
            if (detected !== 'en') {
                window.location.replace('/' + detected + '/');
            } else {
                window.location.replace('/en/');
            }
        } else {
            // lang_pref is 'en'
            window.location.replace('/en/');
        }
    </script>
    <meta http-equiv="refresh" content="0;url=/en/">
</head>
<body>
    <p>Redirecting to <a href="/en/">English version</a>...</p>
</body>
</html>
